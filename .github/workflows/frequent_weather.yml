name: "工作流 B - 每3小時即時天氣與綜合指數更新"

# 觸發條件：
# 1. 排程：每3小時一次 (UTC 0,3,6,9,12,15,18,21點，換算香港時間是8,11,14,17,20,23,2,5點)
# 2. workflow_dispatch：手動觸發，方便測試
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

jobs:
  fetch-frequent-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # 沒有這行，最後的 git push 會因為預設唯讀權限被拒絕

    steps:
      - name: 簽出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: 安裝相依套件
        run: pip install -r scripts/requirements.txt

      - name: 建立輸出目錄（若不存在）
        run: mkdir -p docs/data

      - name: 檢查工作流A的背景資料是否存在
        # 工作流B依賴工作流A產出的 base_tide_*.json，若該檔案完全不存在
        # （例如全新repo第一次跑，工作流A還沒執行過），這裡先給出清楚提示，
        # 而不是讓 frequent_weather_fetch.py 跑到一半才報錯，方便你快速定位問題。
        run: |
          if ! ls docs/data/base_tide_*.json 1> /dev/null 2>&1; then
            echo "::warning::找不到任何 base_tide_*.json，請先手動觸發「工作流A」一次"
          fi

      - name: 執行即時天氣與綜合指數計算腳本
        id: run-script
        run: python scripts/frequent_weather_fetch.py
        continue-on-error: true
        # continue-on-error: true 讓腳本就算 exit 1 也不會打斷後面的步驟。
        # 這樣 git push 一定會執行，前端至少能看到 status:"error" 的 JSON，
        # 而不是因為 push 被跳過而看到 HTTP 404。
        # 最後一個步驟會根據 outcome 決定 job 是否標記為失敗，保留可見度。

      - name: 提交並推送更新後的資料檔案
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tide_score_*.json
          if git diff --staged --quiet; then
            echo "資料無變動，跳過 commit。"
          else
            git commit -m "自動更新：工作流B 即時綜合垂釣指數 ($(date -u +'%Y-%m-%dT%H:%M'))"
            git push
          fi

      - name: 若腳本失敗則標記 job 失敗
        if: steps.run-script.outcome == 'failure'
        # 走到這步代表腳本 exit 1 但 push 已成功執行。
        # 這裡主動讓 job 以失敗結束，讓你在 GitHub Actions 介面一眼看到紅色，
        # 不會以為一切正常（通常原因是工作流A還沒跑，或 API 臨時故障）。
        run: |
          echo "::error::frequent_weather_fetch.py 以非0狀態退出，請檢查上方錯誤訊息（通常是工作流A尚未執行）。"
          exit 1
